<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: pink;
      }
      .box1 {
        border-color: blue;
        border-style: groove;
        border-width: 10px;
      }
      .box2 {
        border: 10px solid red;
        margin-top: 10px;
        border-left: none;
      }
      .box3 {
        border: dashed 2px blue;
      }
    </style>
  </head>
  <body>
    <div></div>
    <hr />
    <div class="box1"></div>
    <hr />
    <div class="box2"></div>
    <hr />
    <div class="box3"></div>
  </body>
</html>
