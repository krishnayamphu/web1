<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>css</title>
    <style>
      .box1 {
        width: 200px;
        height: 100px;
        background-color: rgb(192, 175, 68);
        float: left;
      }
      .box2 {
        width: 300px;
        height: 100px;
        background-color: rgb(89, 186, 89);
        float: left;
      }
      .box3 {
        width: 500px;
        height: 150px;
        background-color: rgb(82, 165, 228);
        clear: left;
      }
    </style>
  </head>
  <body>
    <div class="box1">1</div>
    <div class="box2">2</div>
    <div class="box3">3</div>
  </body>
</html>
