<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        border: 2px solid red;
        float: left;
        margin: 15px;
      }

      .box1 {
        border-radius: 15px;
      }
      .box2 {
        border-radius: 0 25px;
      }
      .box3 {
        border-radius: 25px 55px 40px 0;
      }
      .box4 {
        height: 25px;
        border-radius: 25px;
      }
      .box5 {
        border-radius: 50%;
      }
      img {
        width: 100px;
        border: 2px solid red;
        border-radius: 50px;
      }
    </style>
  </head>
  <body>
    <div></div>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <hr />
    <img src="../student.jpg" alt="" />
  </body>
</html>
