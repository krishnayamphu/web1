<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        margin: 20px;
        background-color: pink;
        float: left;
      }
      .box-red {
        box-shadow: 2px 2px black;
      }
      .box-blue {
        box-shadow: 2px 2px black;
      }

      .box-yellow {
        box-shadow: inset 2px 2px 5px rgb(3, 3, 3);
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <div class="box box-red">box1</div>
    <div class="box box-blue">box2</div>
    <div class="box box-yellow">box3</div>
  </body>
</html>
