<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        margin: 20px;
        background-color: pink;
        float: left;
      }
      .box-red {
        background-color: red;
        padding: 10px;
      }
      .box-blue {
        background-color: blue;
        padding: 10px;
        border: 10px solid black;
      }
      .box-yellow {
        background: yellow;
        padding: 10px;
        border: 10px solid black;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <div class="box box-red">box1</div>
    <div class="box box-blue">box2</div>
    <div class="box box-yellow">box3</div>
  </body>
</html>
