<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: pink;
        display: inline;
      }
      .box3 {
        background-color: blue;
      }

      span {
        width: 100px;
        height: 100px;
        background-color: red;
        display: block;
        margin: 5px;
      }
      a {
        display: inline-block;
        background-color: lightgreen;
        padding: 10px;
      }
      p {
        display: none;
      }
    </style>
  </head>
  <body>
    <div>div 1</div>
    <div class="box3">div 2</div>

    <hr />
    <span>inline 1</span>
    <span>inline 2</span>

    <hr />
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>

    <hr />
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Quas quibusdam
      tempora, id, impedit vel ullam hic distinctio eligendi beatae provident
      iste, nostrum ipsa voluptates rem libero delectus consectetur perspiciatis
      blanditiis.
    </p>
  </body>
</html>
