<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        border: 2px solid black;
        float: left;
        margin: 15px;
      }

      .box1 {
        background-image: linear-gradient(red, blue);
      }
      .box2 {
        background-image: linear-gradient(to right, red, blue);
      }
      .box3 {
        background-image: linear-gradient(45deg, red, blue);
      }
      .box4 {
        background-image: linear-gradient(red, blue, green, yellow);
      }
      .box5 {
        background-image: linear-gradient(red, rgba(0, 0, 255, 0.3));
      }
      .box6 {
        background-image: linear-gradient(
          red 33%,
          blue 33%,
          blue 66%,
          yellow 66%
        );
      }
      .box7 {
        background-image: repeating-linear-gradient(45deg, red, blue 25%);
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
  </body>
</html>
