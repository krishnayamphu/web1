<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>css</title>
    <style>
      h1 {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        line-height: 300px;
        font-size: 80px;
        color: white;
      }
      div {
        width: 800px;
        height: 300px;
        border: 2px solid black;
        margin: 15px auto;
      }

      .box1 {
        background-image:
          linear-gradient(red, rgba(0, 0, 255, 0.573)), url(student.jpg);
      }
      .box2 {
        background-image:
          linear-gradient(
            45deg,
            red,
            rgba(0, 128, 0, 0.693),
            rgba(0, 0, 255, 0.573)
          ),
          url(student.jpg);
      }
      .box3 {
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
          url(student.jpg);
      }
    </style>
  </head>
  <body>
    <div class="box1">
      <h1>Hello World</h1>
    </div>
    <div class="box2">
      <h1>Hello World</h1>
    </div>
    <div class="box3">
      <h1>Hello World</h1>
    </div>
  </body>
</html>
