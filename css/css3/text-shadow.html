<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      h1 {
        font-family: Arial, Helvetica, sans-serif;
      }
      .shadow1 {
        text-shadow: 2px 2px 2px red;
      }

      .shadow2 {
        text-shadow: -2px -2px 2px blue;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <h1 class="shadow1">Hello World</h1>
    <h1 class="shadow2">Hello World</h1>
  </body>
</html>
