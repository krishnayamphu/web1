<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>css</title>
    <style>
      div {
        border: 1px solid red;
        padding: 15px;
      }
      div > p {
        font-family: Arial, Helvetica, sans-serif;
        color: blue;
      }

      span {
        display: block;
        border: 1px solid green;
      }
    </style>
  </head>
  <body>
    <div>
      <p>Paragraph 1</p>
      <span><p>Paragraph 2</p></span>
    </div>
  </body>
</html>
