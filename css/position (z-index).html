<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }
      .box-red {
        background-color: red;
        z-index: 2;
      }
      .box-blue {
        background-color: blue;
        top: 50px;
        left: 50px;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="box box-red">box1</div>
    <div class="box box-blue">box2</div>
  </body>
</html>
