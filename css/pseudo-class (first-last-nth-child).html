<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      p:first-child {
        color: red;
      }
      p:last-child {
        color: blue;
      }
      p:nth-child(2) {
        color: green;
      }

      input:focus-visible {
        outline: red solid 1px;
        border: none;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
    <p>Paragraph 3</p>
    <p>Paragraph 4</p>

    <hr />
    <input type="text" placeholder="type some conten" />
  </body>
</html>
