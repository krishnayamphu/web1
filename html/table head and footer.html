<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Table</title>
    <style>
      table {
        /* border: 1px solid red; */
        border-collapse: collapse;
        margin: 50px auto;
      }
      th,
      td {
        border: 1px solid red;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th>SN</th>
          <th>Particulars</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Mouse</td>
          <td>1000</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Keyboard</td>
          <td>2000</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th colspan="2">Total</th>
          <th>3000</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
