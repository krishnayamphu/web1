<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Table</title>
    <style>
      table {
        /* border: 1px solid red; */
        border-collapse: collapse;
        margin: 50px auto;
      }
      th,
      td {
        border: 1px solid red;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Contact</th>
      </tr>
      <tr>
        <td>Ram Rana</td>
        <td>Patan, Lalitpur</td>
        <td>9801234567</td>
      </tr>
      <tr>
        <td>Ram Rana</td>
        <td>Patan, Lalitpur</td>
        <td>9801234567</td>
      </tr>
      <tr>
        <td>Ram Rana</td>
        <td>Patan, Lalitpur</td>
        <td>9801234567</td>
      </tr>
    </table>

    <table>
      <tr>
        <th colspan="2">Amount</th>
      </tr>
      <tr>
        <th>Rs</th>
        <th>Paisa</th>
      </tr>
    </table>

    <table>
      <tr>
        <th rowspan="2">Country</th>
        <td>Nepal</td>
      </tr>
      <tr>
        <td>India</td>
      </tr>
    </table>
  </body>
</html>
