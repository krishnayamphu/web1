<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=], initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      let a = 10;
      let b = 5;
      a--;
      document.write(a);
      document.write("<br>" + (21 % 5));

      b *= 4; //b=b*4

      document.write("<br>" + b);
      document.write("<br>" + (a > b));

      let c = "20"; //string
      let d = 20; //number

      document.writeln("<br>" + (c == d));
      document.writeln("<br>" + (c === d));

      document.writeln("<br>" + (a < b && a < c));
      document.writeln("<br>" + (a > b ? "a is greater" : "b is greater"));
    </script>
  </body>
</html>
