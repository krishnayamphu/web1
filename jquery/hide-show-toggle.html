<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
    <style>
      p {
        background-color: pink;
        padding: 15px;
      }
    </style>
  </head>
  <body>
    <button id="btn1">Hide</button>
    <button id="btn2">Show</button>
    <button id="btn3">Toggle</button>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Ullam suscipit,
      ex esse autem repellendus ducimus dolorum aspernatur inventore reiciendis
      doloribus! Facere culpa est voluptas consectetur nulla suscipit quasi?
      Inventore, officiis.
    </p>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        //hide paragraph
        $("#btn1").click(function () {
          $("p").hide(2000);
        });

        //show paragraph
        $("#btn2").click(function () {
          $("p").show(2000);
        });

        //toggle paragraph
        $("#btn3").click(function () {
          $("p").toggle(2000);
        });
      });
    </script>
  </body>
</html>
