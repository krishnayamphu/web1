<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jQuery</title>
  </head>
  <body>
    <button id="btn1">Get Value</button>
    <button id="btn2">Set Value</button>

    <input type="text" id="txt1" value="Hello World" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#btn1").click(function () {
          alert($("#txt1").val());
        });

        $("#btn2").click(function () {
          $("#txt1").val("Welcome to jQuery");
        });
      });
    </script>
  </body>
</html>
